# 基础设置
backend = "glx";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;
unredir-if-possible = false;
vsync = true;
dbe = false;
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];
glx-copy-from-front = false;

# 圆角
corner-radius = 15.0;
round-borders = 2;
rounded-corners-exclude = [
    # "class_g *= 'dwm'",
    "class_g *= 'fcitx'",
];

# 阴影
shadow = true;
detect-rounded-corners = true;
shadow-radius = 4;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.5;
shadow-ignore-shaped = false;
shadow-exclude = [
    "_NET_WM_STATE *= '_NET_WM_STATE_HIDDEN'",
    "_GTK_FRAME_EXTENTS",
    "override_redirect = 1 && !WM_CLASS",
    "name = 'Notification'",
    "class_g ?= 'Dmenu'",
    "class_g *= 'dwm'",
    "class_g *= 'Wine'",
    "name = 'Dunst'",
    "class_g *= 'float'",
    "class_g *= 'fcitx'",
    "class_g *= 'talonetray'",
];

#透明
active-opacity = 0.9;   # 活动窗口的透明度（90%）
inactive-opacity = 0.8; # 非活动窗口的透明度（80%）
opacity-rule = [
    "100:fullscreen",
    "100:WM_CLASS *= 'google-chrome' && focused",  # Chrome 窗口聚焦时 90% 透明
    # "90:WM_CLASS *= 'google-chrome'",           # 默认 100% 不透明
    # "100:_NET_WM_STATE *= '_NET_WM_STATE_FULLSCREEN' && class_g *= 'google-chrome'", # 全屏 chrome 窗口
    # "100:_NET_WM_STATE *= '_NET_WM_STATE_FULLSCREEN'",
    # "100:fullscreen || _NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
    # "100:_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'",
    # "100:WM_CLASS@:s *= 'vncviewer'",
#    "100:class_g = 'mpv'",
#    "100:class_g = 'obs'",
#    "100:class_g = 'Gimp'",
#    "100:class_g = 'Gimp'",
    # "100:class_g = 'google-chrome'",
#    "85:!focused",
#    "90:class_g = 'st-256color' && focused",
#    "80:class_g = 'st-256color' && !focused"
];

# 淡入淡出
fading = true;
fade-delta = 3;
fade-in-step = 0.01;
fade-out-step = 0.01;
fade-exclude = [
    "class_g *= 'fcitx'",
    "class_g = 'Rofi'",
    "class_g *= 'screenkey'",
];

# 动画
animations = true;
animation-window-mass = 0.5;
animation-dampening = 16;
animation-stiffness-in-tag = 125;
animation-for-open-window = "zoom";
animation-for-unmap-window = "squeeze";
animation-exclude = [
    "class_g = 'fcitx'",
    "class_g = 'flameshot'",
    "class_g = 'Dunst'",
    "class_g = 'Rofi'",
    "class_g *= 'screenkey'",
];

# 模糊
blur-method = "dual_kawase";
blur-strength = 1;
blur-kern = "3x3box";
blur-background-exclude = [
    "class_g = 'QTILE_BAR'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS",
    "name *? = 'Sunflower'",
    "class_g *= 'wemeetapp'",
];

# 针对窗口类型的设置
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; };
    fullscreen = { fade = true; shadow = false; opacity = 1.0; focus = true; };
    dock = { shadow = false; clip-shadow-above = true; };
};
